# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  schedule:
    - cron: "37/5 * * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://nkphoglftmnfikxzuyqr.supabase.co
    steps:
      - name: Ping Supabase REST API
        run: |
          response_file="$(mktemp)"
          status_code="$(
            curl --silent --show-error \
              --max-time 30 \
              --retry 3 \
              --retry-delay 10 \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --header "apikey: ${SUPABASE_KEEPALIVE_APIKEY}" \
              "${SUPABASE_URL}/rest/v1/applications?select=id&limit=1"
          )"
          echo "Supabase HTTP status: ${status_code}"
          echo "Supabase response body:"
          cat "$response_file"
          echo
          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            exit 1
          fi
        env:
          SUPABASE_KEEPALIVE_APIKEY: ${{ secrets.SUPABASE_KEEPALIVE_APIKEY }}

  # Single deploy job since we're just deploying
  deploy:
    if: github.event_name != 'schedule'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
