name: Supabase keepalive

on:
  schedule:
    - cron: "17 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_KEEPALIVE_URL: https://nkphoglftmnfikxzuyqr.supabase.co/functions/v1/database-access
    steps:
      - name: Ping Supabase applications table
        run: |
          curl --fail --show-error --silent \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            --output /dev/null \
            --header "x-keepalive-token: ${SUPABASE_KEEPALIVE_TOKEN}" \
            "${SUPABASE_KEEPALIVE_URL}?keepalive=1"
        env:
          SUPABASE_KEEPALIVE_TOKEN: ${{ secrets.SUPABASE_KEEPALIVE_TOKEN }}
